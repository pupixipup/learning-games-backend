# coturn configuration for TURN/STUN
# See https://github.com/coturn/coturn/wiki

listening-port=3478
# tls-listening-port=5349
listening-ip=0.0.0.0
# relay-ip=<PUBLIC_IP_OR_INTERFACE>

fingerprint
lt-cred-mech
use-auth-secret
static-auth-secret=2285427
realm=example.com
server-name=coturn

no-multicast-peers
no-stdout-log
simple-log
log-file=/var/log/turnserver.log

# Uncomment and mount TLS certificates if you want DTLS/TLS support
# cert=/etc/coturn/certs/fullchain.pem
# pkey=/etc/coturn/certs/privkey.pem
