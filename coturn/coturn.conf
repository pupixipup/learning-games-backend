# coturn configuration for TURN/STUN — PRODUCTION (VPS).
# Local dev uses coturn.dev.conf (mounted by docker-compose.override.yml).
# See https://github.com/coturn/coturn/wiki

listening-port=3478
# tls-listening-port=5349

listening-ip=0.0.0.0

# Advertise the server's PUBLIC IPv4 to clients as the relay address. Takes an
# IP, never a hostname.
external-ip=87.120.254.82

# relay-ip MUST be set explicitly when external-ip is set. Otherwise the relay
# address defaults to 0.0.0.0 and coturn registers an address mapping
# "external-ip -> 0.0.0.0"; the STUN parser then rewrites EVERY inbound peer
# address equal to our public IP to 0.0.0.0, which is silently rejected with
# "403: Forbidden IP" — breaking relay<->relay between two clients on this
# server (both clients' relay candidates ARE this IP). With relay-ip set, the
# mapping becomes the identity .82 -> .82 and same-server relaying works.
# (see map_addr_from_public_to_private / ioa_addr_add_mapping in coturn)
relay-ip=87.120.254.82

fingerprint
use-auth-secret
# MUST match TURN_SECRET in .env
static-auth-secret=2285427
realm=turn.pupixipup.com
server-name=coturn

no-multicast-peers
# Official coturn/coturn image runs as non-root: log to stdout so Docker
# captures it (docker compose logs coturn), instead of an unwritable file.
log-file=stdout

# Uncomment and mount TLS certificates if you want DTLS/TLS support
# cert=/etc/coturn/certs/fullchain.pem
# pkey=/etc/coturn/certs/privkey.pem
