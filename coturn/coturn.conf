# coturn configuration for TURN/STUN
# See https://github.com/coturn/coturn/wiki
verbose
listening-port=3478
# tls-listening-port=5349
listening-ip=0.0.0.0

# Advertise the server's PUBLIC IPv4 to clients as the relay address. Takes an
# IP, never a hostname. This is the setting that makes TURN work on a public /
# NAT'd host — it's what clients use to reach the relay.
external-ip=87.120.254.82

# relay-ip is the LOCAL interface coturn relays from; only needed on multi-homed
# boxes. Leave unset unless `ip -4 addr show` reveals a PRIVATE interface IP
# behind 1:1 NAT, in which case set both:
#   relay-ip=<private-ip>
#   external-ip=87.120.254.82/<private-ip>
# relay-ip=

# Allow relaying to our own public IP. When BOTH peers are behind UDP-blocking
# networks they each use TURN, so a peer's relay candidate IS this server's IP.
# coturn denies its own address by default (403 "Forbidden IP"), which breaks
# every call where both sides relay — whitelist it to enable that hairpin.
allowed-peer-ip=87.120.254.82

fingerprint
use-auth-secret
static-auth-secret=2285427
realm=turn.pupixipup.com
server-name=coturn

no-multicast-peers
# no-stdout-log
simple-log
log-file=/var/log/turnserver.log

# Uncomment and mount TLS certificates if you want DTLS/TLS support
# cert=/etc/coturn/certs/fullchain.pem
# pkey=/etc/coturn/certs/privkey.pem
