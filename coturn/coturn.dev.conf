# coturn configuration for LOCAL DEV ONLY (mounted by docker-compose.override.yml).
# Differences from coturn.conf (prod):
#   - no external-ip: locally, coturn must advertise its own address, not the
#     VPS public IP, or every relay candidate points at a dead host.
#   - realm is a placeholder (realm is not part of the REST-API HMAC).

listening-port=3478
listening-ip=0.0.0.0

fingerprint
use-auth-secret
# MUST match TURN_SECRET in .env
static-auth-secret=2285427
realm=localhost
server-name=coturn

no-multicast-peers
no-stdout-log
simple-log
log-file=/var/log/turnserver.log
