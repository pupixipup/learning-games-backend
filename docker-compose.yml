# Base stack (production-oriented): the API + TURN server.
#
#   Local dev:  docker compose up          # base + override -> includes db
#   Production: docker compose -f docker-compose.yml up   # base only -> no db
#               (or just deploy the image and set DB_* to Supabase)
services:
  api:
    build: .
    container_name: turn-api
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      - PORT=8080
      # TURN_SECRET MUST match static-auth-secret in coturn/coturn.conf
      - TURN_SECRET=${TURN_SECRET:-2285427}
      - TURN_URLS=${TURN_URLS:-turn:turn.example.com:3478}
      - TURN_TTL=${TURN_TTL:-86400}
      - CORS_ORIGINS=${CORS_ORIGINS:-http://localhost:3000}
      - DB_HOST=${DB_HOST}
      - DB_PORT=${DB_PORT:-5432}
      - DB_USERNAME=${DB_USERNAME:-postgres}
      - DB_PASSWORD=${DB_PASSWORD}
      - DB_NAME=${DB_NAME:-postgres}
      - DB_SSL=${DB_SSL:-true}
      - GAMES_BUCKET=${GAMES_BUCKET:-templates}
      - S3_ENDPOINT=${S3_ENDPOINT}
      - S3_ACCESS_KEY=${S3_ACCESS_KEY}
      - S3_SECRET_KEY=${S3_SECRET_KEY}
    depends_on:
      coturn:
        condition: service_started

  coturn:
    image: instrumentisto/coturn:latest
    container_name: coturn
    restart: unless-stopped
    network_mode: host
    volumes:
      - ./coturn/coturn.conf:/etc/coturn/turnserver.conf:ro
    environment:
      - TZ=UTC
    command: ["turnserver", "-c", "/etc/coturn/turnserver.conf"]

# IPv6 on the api's network. Supabase's direct DB endpoint
# (db.<ref>.supabase.co) is IPv6-only, and Docker's default bridge is
# IPv4-only, so the api container needs an IPv6-enabled network to reach it.
# Requires the daemon to have {"ipv6": true, "ip6tables": true} for NAT66.
# (coturn is unaffected — it uses network_mode: host.)
networks:
  default:
    enable_ipv6: true
    ipam:
      config:
        - subnet: fd00:dead:beef::/64
