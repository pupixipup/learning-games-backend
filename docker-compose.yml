services:
  api:
    build: .
    container_name: turn-api
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      - PORT=8080
      # TURN_SECRET MUST match static-auth-secret in coturn/coturn.conf
      - TURN_SECRET=${TURN_SECRET:-2285427}
      - TURN_URLS=${TURN_URLS:-turn:turn.example.com:3478}
      - TURN_TTL=${TURN_TTL:-86400}
      - CORS_ORIGINS=${CORS_ORIGINS:-http://localhost:3000}
    depends_on:
      - coturn

  coturn:
    image: instrumentisto/coturn:latest
    container_name: coturn
    restart: unless-stopped
    ports:
      - "3478:3478/udp"
      - "3478:3478/tcp"
      - "5349:5349/tcp"
    volumes:
      - ./coturn/coturn.conf:/etc/coturn/turnserver.conf:ro
    environment:
      - TZ=UTC
    command: ["turnserver", "-c", "/etc/coturn/turnserver.conf"]
