services:
  api:
    build: .
    container_name: turn-api
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      - PORT=8080
      # TURN_SECRET MUST match static-auth-secret in coturn/coturn.conf
      - TURN_SECRET=${TURN_SECRET:-2285427}
      - TURN_URLS=${TURN_URLS:-turn:turn.example.com:3478}
      - TURN_TTL=${TURN_TTL:-86400}
      - CORS_ORIGINS=${CORS_ORIGINS:-http://localhost:3000}
      # Inside the compose network the API reaches Postgres via the `db` host.
      - DB_HOST=db
      - DB_PORT=5432
      - DB_USERNAME=${DB_USERNAME:-postgres}
      - DB_PASSWORD=${DB_PASSWORD:-postgres}
      - DB_NAME=${DB_NAME:-turn}
      - DB_MIGRATIONS_RUN=${DB_MIGRATIONS_RUN:-true}
    depends_on:
      coturn:
        condition: service_started
      db:
        condition: service_healthy

  db:
    image: postgres:16-alpine
    container_name: turn-db
    restart: unless-stopped
    environment:
      - POSTGRES_USER=${DB_USERNAME:-postgres}
      - POSTGRES_PASSWORD=${DB_PASSWORD:-postgres}
      - POSTGRES_DB=${DB_NAME:-turn}
    ports:
      # Published so host-run tooling (npm run migration:run) can reach it.
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USERNAME:-postgres} -d ${DB_NAME:-turn}"]
      interval: 5s
      timeout: 5s
      retries: 5

  coturn:
    image: instrumentisto/coturn:latest
    container_name: coturn
    restart: unless-stopped
    ports:
      - "3478:3478/udp"
      - "3478:3478/tcp"
      - "5349:5349/tcp"
    volumes:
      - ./coturn/coturn.conf:/etc/coturn/turnserver.conf:ro
    environment:
      - TZ=UTC
    command: ["turnserver", "-c", "/etc/coturn/turnserver.conf"]

volumes:
  pgdata:
